name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.CAPSTONE_CI_VAR }}
          password: ${{ secrets.CAPSTONE_CI_SECRET }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ vars.CAPSTONE_CI_VAR }}/capstonerag:latest
            ${{ vars.CAPSTONE_CI_VAR }}/capstonerag:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=min